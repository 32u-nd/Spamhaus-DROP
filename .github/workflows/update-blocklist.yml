name: Update Spamhaus DROP JSON

on:
  schedule:
    # Runs at 06:05 UTC and 18:05 UTC every day
    - cron: "5 6 * * *"
    - cron: "5 18 * * *"
  workflow_dispatch:  # Allow manual trigger from the GitHub UI

permissions:
  contents: write  # Required to commit the generated JSON back to the repo

jobs:
  update-blocklist:
    name: Fetch & Consolidate DROP Lists
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run spamhaus_ripe.py
        run: python spamhaus_ripe.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spamhaus_ripe.json
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            git commit -m "chore: update spamhaus_ripe.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi